name: Build and Release Prefixed Socket.IO

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v16.1.0)'
        required: true
        default: 'v16.1.0'
      create_tag:
        description: 'Create git tag for this version'
        required: false
        default: true
        type: boolean

env:
  PREFIX: SCX
  SOCKETIO_REPO: https://github.com/socketio/socket.io-client-swift.git
  STARSCREAM_REPO: https://github.com/daltoniam/Starscream.git

jobs:
  build:
    name: Build Prefixed Framework
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install dependencies
      run: |
        brew install gnu-sed rename

    - name: Set version variable
      run: |
        VERSION="${{ github.event.inputs.version }}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Clone Socket.IO and dependencies
      run: |
        echo "Cloning Socket.IO version: $VERSION"

        # Clone Socket.IO client
        git clone --depth 1 --branch $VERSION $SOCKETIO_REPO socketio-source

        # Clone Starscream (dependency)
        cd socketio-source
        STARSCREAM_VERSION=$(grep -A 2 'url.*Starscream' Package.swift | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | head -1)
        cd ..

        if [ -z "$STARSCREAM_VERSION" ]; then
          STARSCREAM_VERSION="4.0.8"
        fi

        git clone --depth 1 --branch $STARSCREAM_VERSION $STARSCREAM_REPO starscream-source || \
        git clone --depth 1 $STARSCREAM_REPO starscream-source

    - name: Prefix Starscream symbols
      run: |
        echo "=== Starscream has multi-module structure ==="
        echo "Listing all Swift files in Sources/:"
        find starscream-source/Sources -name "*.swift" -type f | sort
        echo "Total files: $(find starscream-source/Sources -name "*.swift" -type f | wc -l)"

        # Prefix ALL sources, not just Starscream subdirectory
        echo ""
        echo "Prefixing all Starscream modules..."
        for dir in starscream-source/Sources/*/; do
          dirname=$(basename "$dir")
          echo "Processing module: $dirname"
          ./scripts/prefix-symbols.sh starscream-source "Sources/$dirname" Starscream $PREFIX
        done

        echo ""
        echo "=== After prefixing all modules ==="
        find starscream-source/Sources -name "*.swift" -type f | wc -l

        # Update Starscream Package.swift
        cd starscream-source
        gsed -i "s/name: \"Starscream\"/name: \"${PREFIX}Starscream\"/g" Package.swift
        gsed -i "s/\"Starscream\"/\"${PREFIX}Starscream\"/g" Package.swift
        cd ..

    - name: Prefix Socket.IO symbols
      run: |
        echo "=== Before prefixing Socket.IO ==="
        find socketio-source/Source/SocketIO -name "*.swift" -type f | sort
        echo "Total files: $(find socketio-source/Source/SocketIO -name "*.swift" -type f | wc -l)"

        ./scripts/prefix-symbols.sh socketio-source Source/SocketIO SocketIO $PREFIX

        echo ""
        echo "=== After prefixing Socket.IO ==="
        find socketio-source/Source/SocketIO -name "*.swift" -type f | sort
        echo "Total files: $(find socketio-source/Source/SocketIO -name "*.swift" -type f | wc -l)"

        # Update Socket.IO Package.swift to use prefixed Starscream
        cd socketio-source
        gsed -i "s/name: \"SocketIO\"/name: \"${PREFIX}SocketIO\"/g" Package.swift
        gsed -i "s/\"SocketIO\"/\"${PREFIX}SocketIO\"/g" Package.swift

        # Update import statements in all Swift files
        find Source/SocketIO -name "*.swift" -type f -exec gsed -i "s/import Starscream/import ${PREFIX}Starscream/g" {} \;
        cd ..

    - name: Prepare build directory
      run: |
        # Create a temporary Package.swift for building
        mkdir -p build-temp
        cd build-temp

        # Copy Package.swift structure
        cat > Package.swift << 'EOF'
        // swift-tools-version: 5.9
        import PackageDescription

        let package = Package(
            name: "SCXSocketIO",
            platforms: [.iOS(.v13), .macOS(.v10_15), .tvOS(.v13), .watchOS(.v6)],
            products: [
                .library(name: "SCXSocketIO", type: .dynamic, targets: ["SCXSocketIO"]),
                .library(name: "SCXStarscream", type: .dynamic, targets: ["SCXStarscream"])
            ],
            targets: [
                .target(name: "SCXStarscream", path: "Sources/SCXStarscream"),
                .target(name: "SCXSocketIO", dependencies: ["SCXStarscream"], path: "Sources/SCXSocketIO")
            ]
        )
        EOF

        # Copy prefixed sources
        mkdir -p Sources/SCXStarscream
        mkdir -p Sources/SCXSocketIO

        echo "=== Copying ALL Starscream modules ==="
        echo "Source structure:"
        ls -la ../starscream-source/Sources/

        # Copy ALL subdirectories from Sources/, not just Starscream/
        echo ""
        echo "Copying all modules to SCXStarscream..."
        for dir in ../starscream-source/Sources/*/; do
          dirname=$(basename "$dir")
          echo "Copying module: $dirname"
          cp -rv "$dir"* Sources/SCXStarscream/
        done

        echo ""
        echo "Copied to build-temp/Sources/SCXStarscream/:"
        find Sources/SCXStarscream -name "*.swift" -type f | sort
        echo "Total Swift files: $(find Sources/SCXStarscream -name "*.swift" -type f | wc -l)"

        echo ""
        echo "=== Copying SocketIO files ==="
        cp -rv ../socketio-source/Source/SocketIO/* Sources/SCXSocketIO/

        echo ""
        echo "Copied to build-temp/Sources/SCXSocketIO/:"
        find Sources/SCXSocketIO -name "*.swift" -type f | sort
        echo "Total Swift files: $(find Sources/SCXSocketIO -name "*.swift" -type f | wc -l)"

        # Copy privacy manifest
        mkdir -p Sources/SCXSocketIO/Resources
        cp ../Resources/PrivacyInfo.xcprivacy Sources/SCXSocketIO/Resources/

        echo ""
        echo "=== Final build-temp structure ==="
        ls -R Sources/

    - name: Build XCFrameworks
      run: |
        cd build-temp

        # Build for iOS
        echo "Building for iOS..."
        xcodebuild archive \
          -scheme SCXStarscream \
          -destination "generic/platform=iOS" \
          -archivePath "../build/SCXStarscream-iOS" \
          SKIP_INSTALL=NO \
          BUILD_LIBRARY_FOR_DISTRIBUTION=YES

        xcodebuild archive \
          -scheme SCXStarscream \
          -destination "generic/platform=iOS Simulator" \
          -archivePath "../build/SCXStarscream-Simulator" \
          SKIP_INSTALL=NO \
          BUILD_LIBRARY_FOR_DISTRIBUTION=YES

        # Create XCFramework for Starscream
        xcodebuild -create-xcframework \
          -archive ../build/SCXStarscream-iOS.xcarchive -framework SCXStarscream.framework \
          -archive ../build/SCXStarscream-Simulator.xcarchive -framework SCXStarscream.framework \
          -output ../build/SCXStarscream.xcframework

        # Build SocketIO
        echo "Building SCXSocketIO..."
        xcodebuild archive \
          -scheme SCXSocketIO \
          -destination "generic/platform=iOS" \
          -archivePath "../build/SCXSocketIO-iOS" \
          SKIP_INSTALL=NO \
          BUILD_LIBRARY_FOR_DISTRIBUTION=YES

        xcodebuild archive \
          -scheme SCXSocketIO \
          -destination "generic/platform=iOS Simulator" \
          -archivePath "../build/SCXSocketIO-Simulator" \
          SKIP_INSTALL=NO \
          BUILD_LIBRARY_FOR_DISTRIBUTION=YES

        # Create XCFramework for SocketIO
        xcodebuild -create-xcframework \
          -archive ../build/SCXSocketIO-iOS.xcarchive -framework SCXSocketIO.framework \
          -archive ../build/SCXSocketIO-Simulator.xcarchive -framework SCXSocketIO.framework \
          -output ../build/SCXSocketIO.xcframework

        echo "XCFrameworks created successfully"
        ls -lh ../build/*.xcframework

    - name: Package XCFrameworks
      run: |
        # Zip each XCFramework separately
        cd build

        # Zip SCXStarscream
        zip -r SCXStarscream.xcframework.zip SCXStarscream.xcframework
        STARSCREAM_CHECKSUM=$(shasum -a 256 SCXStarscream.xcframework.zip | awk '{print $1}')

        # Zip SCXSocketIO
        zip -r SCXSocketIO.xcframework.zip SCXSocketIO.xcframework
        SOCKETIO_CHECKSUM=$(shasum -a 256 SCXSocketIO.xcframework.zip | awk '{print $1}')

        cd ..

        # Save checksums to env
        echo "STARSCREAM_CHECKSUM=$STARSCREAM_CHECKSUM" >> $GITHUB_ENV
        echo "SOCKETIO_CHECKSUM=$SOCKETIO_CHECKSUM" >> $GITHUB_ENV

        echo "Starscream Checksum: $STARSCREAM_CHECKSUM"
        echo "SocketIO Checksum: $SOCKETIO_CHECKSUM"

    - name: Generate checksums file
      run: |
        cat > checksums.txt << EOF
        ${{ env.STARSCREAM_CHECKSUM }}  SCXStarscream.xcframework.zip
        ${{ env.SOCKETIO_CHECKSUM }}  SCXSocketIO.xcframework.zip
        EOF
        cat checksums.txt

    - name: Update Package.swift with binary targets
      run: |
        # Create updated Package.swift with binary targets
        cat > Package.swift << 'EOF'
        // swift-tools-version: 5.9
        import PackageDescription

        let package = Package(
            name: "SCXSocketIO",
            platforms: [
                .iOS(.v13),
                .macOS(.v10_15),
                .tvOS(.v13),
                .watchOS(.v6)
            ],
            products: [
                .library(name: "SCXSocketIO", targets: ["SCXSocketIO"]),
                .library(name: "SCXStarscream", targets: ["SCXStarscream"])
            ],
            targets: [
                .binaryTarget(
                    name: "SCXStarscream",
                    url: "https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/SCXStarscream.xcframework.zip",
                    checksum: "${{ env.STARSCREAM_CHECKSUM }}"
                ),
                .binaryTarget(
                    name: "SCXSocketIO",
                    url: "https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/SCXSocketIO.xcframework.zip",
                    checksum: "${{ env.SOCKETIO_CHECKSUM }}"
                )
            ]
        )
        EOF

        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add Package.swift
        git commit -m "chore: Update Package.swift with binary targets for ${{ env.VERSION }}"
        git push origin HEAD:main

    - name: Create and push tag
      run: |
        VERSION="${{ env.VERSION }}"

        # Check if tag already exists
        if git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "Tag $VERSION already exists, deleting it..."
          git tag -d "$VERSION"
          git push origin ":refs/tags/$VERSION" || true
        fi

        # Create and push new tag
        git tag -a "$VERSION" -m "Release $VERSION"
        git push origin "$VERSION"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.VERSION }}
        name: ${{ env.VERSION }}
        body: |
          ## SCXSocketIO ${{ env.VERSION }}

          Prefixed build of Socket.IO Client Swift with 'SCX' prefix to avoid symbol conflicts.
          **Pre-compiled XCFramework binaries** for fast SPM integration.

          ### ✨ Features
          - ✅ All Socket.IO classes prefixed with SCX
          - ✅ All Starscream classes prefixed with SCX
          - ✅ Privacy manifest included
          - ✅ Pre-compiled XCFrameworks (fast builds)
          - ✅ SPM binary target support
          - ✅ iOS 13+, macOS 10.15+, tvOS 13+, watchOS 6+

          ### 📦 Installation

          #### Swift Package Manager (Recommended)
          Add to your `Package.swift`:
          ```swift
          dependencies: [
              .package(url: "https://github.com/${{ github.repository }}", from: "${{ env.VERSION }}")
          ]
          ```

          Or in Xcode:
          1. **File → Add Package Dependencies**
          2. Enter: `https://github.com/${{ github.repository }}`
          3. Select version **${{ env.VERSION }}** and add to your target

          SPM will automatically download the pre-compiled XCFrameworks!

          #### Manual Installation
          Download the XCFramework files below and add them to your project:
          - `SCXStarscream.xcframework.zip`
          - `SCXSocketIO.xcframework.zip`

          ### 🚀 Usage
          ```swift
          import SCXSocketIO

          let manager = SCXSocketManager(socketURL: URL(string: "https://example.com")!)
          let socket = manager.defaultSocket

          socket.on(clientEvent: .connect) { data, ack in
              print("Connected!")
          }

          socket.connect()
          ```

          ### 📋 What's in this Release

          | File | Size | Checksum |
          |------|------|----------|
          | SCXStarscream.xcframework.zip | - | `${{ env.STARSCREAM_CHECKSUM }}` |
          | SCXSocketIO.xcframework.zip | - | `${{ env.SOCKETIO_CHECKSUM }}` |

          ### 📚 Documentation
          - [Quick Start Guide](https://github.com/${{ github.repository }}/blob/main/QUICKSTART.md)
          - [Full Usage Documentation](https://github.com/${{ github.repository }}/blob/main/USAGE.md)
          - [Contributing Guide](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)

          ### ⚡ Why Pre-compiled Binaries?
          - **Faster builds** - No need to compile Socket.IO on every clean build
          - **Consistent** - Same binary for all users
          - **Tested** - Built and tested in CI/CD

          ---

          **Full Checksums:**
          ```
          $(cat checksums.txt)
          ```
        files: |
          build/SCXStarscream.xcframework.zip
          build/SCXSocketIO.xcframework.zip
          checksums.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
