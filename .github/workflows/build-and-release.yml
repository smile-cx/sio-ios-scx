name: Build and Release Prefixed Socket.IO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v16.1.0)'
        required: true
        default: 'v16.1.0'

env:
  PREFIX: SCX
  SOCKETIO_REPO: https://github.com/socketio/socket.io-client-swift.git
  STARSCREAM_REPO: https://github.com/daltoniam/Starscream.git

jobs:
  build:
    name: Build Prefixed Framework
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install dependencies
      run: |
        brew install gnu-sed rename

    - name: Clone Socket.IO and dependencies
      run: |
        VERSION="${{ github.event.inputs.version || github.ref_name }}"
        echo "Building version: $VERSION"

        # Clone Socket.IO client
        git clone --depth 1 --branch $VERSION $SOCKETIO_REPO socketio-source

        # Clone Starscream (dependency)
        cd socketio-source
        STARSCREAM_VERSION=$(grep -A 2 'url.*Starscream' Package.swift | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | head -1)
        cd ..

        if [ -z "$STARSCREAM_VERSION" ]; then
          STARSCREAM_VERSION="4.0.8"
        fi

        git clone --depth 1 --branch $STARSCREAM_VERSION $STARSCREAM_REPO starscream-source || \
        git clone --depth 1 $STARSCREAM_REPO starscream-source

    - name: Prefix Starscream symbols
      run: |
        ./scripts/prefix-symbols.sh starscream-source Sources/Starscream Starscream $PREFIX

        # Update Starscream Package.swift
        cd starscream-source
        gsed -i "s/name: \"Starscream\"/name: \"${PREFIX}Starscream\"/g" Package.swift
        gsed -i "s/\"Starscream\"/\"${PREFIX}Starscream\"/g" Package.swift
        cd ..

    - name: Prefix Socket.IO symbols
      run: |
        ./scripts/prefix-symbols.sh socketio-source Source/SocketIO SocketIO $PREFIX

        # Update Socket.IO Package.swift to use prefixed Starscream
        cd socketio-source
        gsed -i "s/name: \"SocketIO\"/name: \"${PREFIX}SocketIO\"/g" Package.swift
        gsed -i "s/\"SocketIO\"/\"${PREFIX}SocketIO\"/g" Package.swift

        # Update import statements in all Swift files
        find Source/SocketIO -name "*.swift" -type f -exec gsed -i "s/import Starscream/import ${PREFIX}Starscream/g" {} \;
        cd ..

    - name: Debug - Check source directories
      run: |
        echo "=== Starscream source structure ==="
        find starscream-source/Sources -type f -name "*.swift" | head -20
        echo ""
        echo "=== SocketIO source structure ==="
        find socketio-source/Source -type f -name "*.swift" | head -20

    - name: Copy prefixed sources to main repo
      run: |
        # Copy Starscream preserving directory structure
        echo "Copying Starscream sources..."
        rm -rf Sources/${PREFIX}Starscream
        cp -R starscream-source/Sources/Starscream Sources/${PREFIX}Starscream

        echo "Starscream files copied:"
        find Sources/${PREFIX}Starscream -name "*.swift" -type f
        echo "Total: $(find Sources/${PREFIX}Starscream -name "*.swift" -type f | wc -l) Swift files"

        # Copy SocketIO preserving directory structure
        echo "Copying SocketIO sources..."
        rm -rf Sources/${PREFIX}SocketIO
        cp -R socketio-source/Source/SocketIO Sources/${PREFIX}SocketIO

        echo "SocketIO files copied:"
        find Sources/${PREFIX}SocketIO -name "*.swift" -type f
        echo "Total: $(find Sources/${PREFIX}SocketIO -name "*.swift" -type f | wc -l) Swift files"

        # Copy privacy manifest
        mkdir -p Sources/${PREFIX}SocketIO/Resources
        cp Resources/PrivacyInfo.xcprivacy Sources/${PREFIX}SocketIO/Resources/

        echo ""
        echo "Final structure:"
        ls -R Sources/

    - name: Validate Package
      run: |
        swift package resolve
        swift package dump-package
        swift build --configuration release

    - name: Create source distribution
      run: |
        VERSION="${{ github.event.inputs.version || github.ref_name }}"
        ARCHIVE_NAME="${PREFIX}SocketIO-${VERSION}-source.zip"

        # Create distribution directory with all source files
        mkdir -p dist

        # Copy SPM package structure
        cp Package.swift dist/
        cp -r Sources dist/
        cp -r Resources dist/
        cp README.md dist/
        cp LICENSE dist/
        cp USAGE.md dist/ 2>/dev/null || true
        cp QUICKSTART.md dist/ 2>/dev/null || true

        # Create archive
        cd dist
        zip -r ../$ARCHIVE_NAME .
        cd ..

        echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Generate checksums
      run: |
        shasum -a 256 $ARCHIVE_NAME > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        body: |
          ## ${PREFIX}SocketIO ${{ env.VERSION }}

          Prefixed build of Socket.IO Client Swift with '${{ env.PREFIX }}' prefix to avoid symbol conflicts.

          ### Installation

          #### Swift Package Manager (Recommended)
          Add to your `Package.swift`:
          ```swift
          dependencies: [
              .package(url: "https://github.com/${{ github.repository }}", from: "${{ env.VERSION }}")
          ]
          ```

          Or in Xcode:
          1. File → Add Package Dependencies
          2. Enter: `https://github.com/${{ github.repository }}`
          3. Select version and add to your target

          #### Manual Installation
          Download the source archive and integrate the `Sources/` directory into your project.

          ### What's Included
          - ✅ All Socket.IO classes prefixed with ${{ env.PREFIX }}
          - ✅ All Starscream classes prefixed with ${{ env.PREFIX }}
          - ✅ Privacy manifest included
          - ✅ Full source code (no binaries)
          - ✅ Ready for SPM integration

          ### Usage
          ```swift
          import SCXSocketIO

          let manager = SCXSocketManager(socketURL: URL(string: "https://example.com")!)
          let socket = manager.defaultSocket
          socket.connect()
          ```

          ### Checksums
          ```
          $(cat checksums.txt)
          ```

          For detailed usage instructions, see [USAGE.md](https://github.com/${{ github.repository }}/blob/${{ env.VERSION }}/USAGE.md)
        files: |
          ${{ env.ARCHIVE_NAME }}
          checksums.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
