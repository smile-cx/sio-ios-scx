name: Build and Release Prefixed Socket.IO

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Socket.IO version tag to build (e.g. v16.1.0)'
        required: true
        default: 'v16.1.0'

env:
  PREFIX: SCX
  SOCKETIO_REPO: https://github.com/socketio/socket.io-client-swift.git
  STARSCREAM_REPO: https://github.com/daltoniam/Starscream.git

jobs:
  build:
    name: Build Prefixed XCFrameworks
    runs-on: macos-15

    steps:
    # ── Setup ────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Set version
      run: |
        VERSION="${{ github.event.inputs.version }}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building Socket.IO $VERSION with prefix $PREFIX"

    # ── Clone sources ────────────────────────────────────────────────────
    - name: Clone Socket.IO
      run: |
        git clone --depth 1 --branch "$VERSION" "$SOCKETIO_REPO" socketio-source
        echo "Socket.IO cloned at $VERSION"

    - name: Clone Starscream (dependency)
      run: |
        # Extract Starscream version from Socket.IO's Package.swift
        STAR_VER=$(grep -A5 'Starscream' socketio-source/Package.swift \
          | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
        echo "Detected Starscream version requirement: ${STAR_VER:-not found}"
        STAR_VER="${STAR_VER:-4.0.8}"

        git clone --depth 1 --branch "$STAR_VER" "$STARSCREAM_REPO" starscream-source \
          || git clone --depth 1 "$STARSCREAM_REPO" starscream-source

        echo "STARSCREAM_VERSION=$STAR_VER" >> $GITHUB_ENV
        echo "Starscream cloned at $STAR_VER"

    # ── Assemble sources first, then prefix everything together ─────────
    - name: Assemble build package sources
      run: |
        mkdir -p build-pkg/Sources/${PREFIX}Starscream
        mkdir -p build-pkg/Sources/${PREFIX}SocketIO

        # Copy ALL Starscream submodules into a flat target directory
        for dir in starscream-source/Sources/*/; do
          cp -R "$dir"/* "build-pkg/Sources/${PREFIX}Starscream/" 2>/dev/null || true
        done
        cp starscream-source/Sources/*.swift "build-pkg/Sources/${PREFIX}Starscream/" 2>/dev/null || true

        # Copy Socket.IO sources
        cp -R socketio-source/Source/SocketIO/* "build-pkg/Sources/${PREFIX}SocketIO/"

        # Copy PrivacyInfo.xcprivacy into both targets
        cp Resources/PrivacyInfo.xcprivacy "build-pkg/Sources/${PREFIX}Starscream/"
        cp Resources/PrivacyInfo.xcprivacy "build-pkg/Sources/${PREFIX}SocketIO/"

        echo "Starscream Swift files: $(find build-pkg/Sources/${PREFIX}Starscream -name '*.swift' | wc -l)"
        echo "SocketIO Swift files:   $(find build-pkg/Sources/${PREFIX}SocketIO -name '*.swift' | wc -l)"

    - name: Prefix all symbols (single pass across both libraries)
      run: |
        # Run prefix on the entire Sources dir so both Starscream and SocketIO
        # types are discovered and renamed consistently across both libraries
        python3 scripts/prefix-symbols.py build-pkg/Sources "$PREFIX"

    - name: Fix cross-module references
      run: |
        # Update import statements
        find build-pkg/Sources/${PREFIX}SocketIO -name '*.swift' -exec \
          sed -i '' "s/import Starscream/import ${PREFIX}Starscream/g" {} +

        # Update module-qualified references: Starscream.Foo -> SCXStarscream.Foo
        find build-pkg/Sources/${PREFIX}SocketIO -name '*.swift' -exec \
          sed -i '' "s/Starscream\./SCXStarscream./g" {} +

        echo "Cross-module references updated"

    - name: Generate build Package.swift
      run: |
        cat > build-pkg/Package.swift << 'EOF'
        // swift-tools-version: 5.9
        import PackageDescription

        let prefix = "SCX"

        let package = Package(
            name: "\(prefix)SocketIO",
            platforms: [
                .iOS(.v13),
                .macOS(.v10_15),
                .tvOS(.v13),
                .watchOS(.v6)
            ],
            products: [
                .library(name: "\(prefix)Starscream", type: .dynamic, targets: ["\(prefix)Starscream"]),
                .library(name: "\(prefix)SocketIO",   type: .dynamic, targets: ["\(prefix)SocketIO"]),
            ],
            targets: [
                .target(
                    name: "\(prefix)Starscream",
                    path: "Sources/\(prefix)Starscream",
                    resources: [.copy("PrivacyInfo.xcprivacy")]
                ),
                .target(
                    name: "\(prefix)SocketIO",
                    dependencies: [.target(name: "\(prefix)Starscream")],
                    path: "Sources/\(prefix)SocketIO",
                    resources: [.copy("PrivacyInfo.xcprivacy")]
                ),
            ]
        )
        EOF

        echo "Generated Package.swift:"
        cat build-pkg/Package.swift

    - name: Resolve & verify package
      run: |
        cd build-pkg
        swift package resolve
        swift package dump-package
        echo "Package resolves successfully"

    # ── Build XCFrameworks ───────────────────────────────────────────────
    - name: Build XCFrameworks
      run: |
        SCHEMES=("${PREFIX}Starscream" "${PREFIX}SocketIO")
        ARCHIVE_DIR="$(pwd)/build/archives"
        OUTPUT_DIR="$(pwd)/build/output"
        mkdir -p "$ARCHIVE_DIR" "$OUTPUT_DIR"

        cd build-pkg

        for SCHEME in "${SCHEMES[@]}"; do
          echo ""
          echo "=========================================="
          echo "Building $SCHEME"
          echo "=========================================="

          IOS_ARCHIVE="$ARCHIVE_DIR/${SCHEME}-iOS.xcarchive"
          SIM_ARCHIVE="$ARCHIVE_DIR/${SCHEME}-Simulator.xcarchive"

          # iOS device
          echo "Archiving for iOS device..."
          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "$IOS_ARCHIVE" \
            -configuration Release \
            -skipPackagePluginValidation \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            ONLY_ACTIVE_ARCH=NO

          # iOS Simulator
          echo "Archiving for iOS Simulator..."
          xcodebuild archive \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -archivePath "$SIM_ARCHIVE" \
            -configuration Release \
            -skipPackagePluginValidation \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            ONLY_ACTIVE_ARCH=NO

          # Locate the .framework inside each archive (search entire archive)
          IOS_FW=$(find "$IOS_ARCHIVE" -name "${SCHEME}.framework" -type d | head -1)
          SIM_FW=$(find "$SIM_ARCHIVE" -name "${SCHEME}.framework" -type d | head -1)

          if [ -z "$IOS_FW" ] || [ -z "$SIM_FW" ]; then
            echo "ERROR: framework not found in archives for $SCHEME"
            echo "iOS archive contents:"
            find "$IOS_ARCHIVE" -name "*.framework" -type d 2>/dev/null
            echo "Sim archive contents:"
            find "$SIM_ARCHIVE" -name "*.framework" -type d 2>/dev/null
            exit 1
          fi

          echo "iOS framework:  $IOS_FW"
          echo "Sim framework:  $SIM_FW"

          # Create XCFramework
          xcodebuild -create-xcframework \
            -framework "$IOS_FW" \
            -framework "$SIM_FW" \
            -output "$OUTPUT_DIR/${SCHEME}.xcframework"

          echo "$SCHEME.xcframework created successfully"
        done

        cd ..
        echo ""
        echo "=========================================="
        echo "All XCFrameworks built"
        echo "=========================================="
        ls -lh "$OUTPUT_DIR"/*.xcframework

    # ── Verify PrivacyInfo is embedded ───────────────────────────────────
    - name: Verify PrivacyInfo.xcprivacy
      run: |
        for FW in build/output/*.xcframework; do
          NAME=$(basename "$FW")
          FOUND=$(find "$FW" -name "PrivacyInfo.xcprivacy" | head -1)
          if [ -n "$FOUND" ]; then
            echo "OK: $NAME contains PrivacyInfo.xcprivacy"
          else
            echo "WARNING: $NAME does NOT contain PrivacyInfo.xcprivacy"
          fi
        done

    # ── Package & checksum ───────────────────────────────────────────────
    - name: Package XCFrameworks
      run: |
        cd build/output

        for FW in *.xcframework; do
          ZIPNAME="${FW%.xcframework}.xcframework.zip"
          zip -r -y "$ZIPNAME" "$FW"
          echo "Created $ZIPNAME ($(du -h "$ZIPNAME" | cut -f1))"
        done

        shasum -a 256 *.zip | tee checksums.txt

        STAR_CS=$(grep "${PREFIX}Starscream" checksums.txt | awk '{print $1}')
        SIO_CS=$(grep "${PREFIX}SocketIO" checksums.txt | awk '{print $1}')
        echo "STARSCREAM_CHECKSUM=$STAR_CS" >> $GITHUB_ENV
        echo "SOCKETIO_CHECKSUM=$SIO_CS" >> $GITHUB_ENV

    # ── Update Package.swift for consumers ───────────────────────────────
    - name: Update Package.swift with binary targets
      run: |
        REPO="${{ github.repository }}"
        VER="${{ env.VERSION }}"
        STAR_CS="${{ env.STARSCREAM_CHECKSUM }}"
        SIO_CS="${{ env.SOCKETIO_CHECKSUM }}"

        cat > Package.swift << PKGEOF
        // swift-tools-version: 5.9
        import PackageDescription

        let package = Package(
            name: "SCXSocketIO",
            platforms: [
                .iOS(.v13),
                .macOS(.v10_15),
                .tvOS(.v13),
                .watchOS(.v6)
            ],
            products: [
                .library(name: "SCXSocketIO",   targets: ["SCXSocketIO"]),
                .library(name: "SCXStarscream", targets: ["SCXStarscream"]),
            ],
            targets: [
                .binaryTarget(
                    name: "SCXStarscream",
                    url: "https://github.com/${REPO}/releases/download/${VER}/SCXStarscream.xcframework.zip",
                    checksum: "${STAR_CS}"
                ),
                .binaryTarget(
                    name: "SCXSocketIO",
                    url: "https://github.com/${REPO}/releases/download/${VER}/SCXSocketIO.xcframework.zip",
                    checksum: "${SIO_CS}"
                ),
            ]
        )
        PKGEOF

        echo "Updated Package.swift:"
        cat Package.swift

    - name: Commit updated Package.swift
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Package.swift
        git commit -m "chore: update Package.swift binary targets for $VERSION" || echo "No changes to commit"
        git push origin main

    # ── Tag & Release ────────────────────────────────────────────────────
    - name: Create tag
      run: |
        # Delete existing tag if present
        git tag -d "$VERSION" 2>/dev/null || true
        git push origin ":refs/tags/$VERSION" 2>/dev/null || true

        git tag -a "$VERSION" -m "Release $VERSION - Prefixed Socket.IO XCFrameworks"
        git push origin "$VERSION"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: SCXSocketIO ${{ env.VERSION }}
        body: |
          ## SCXSocketIO ${{ env.VERSION }}

          Pre-compiled **Socket.IO Client Swift** with `SCX` prefix on all symbols to avoid duplicate-symbol conflicts.

          Based on [socket.io-client-swift](https://github.com/socketio/socket.io-client-swift) `${{ env.VERSION }}` + Starscream `${{ env.STARSCREAM_VERSION }}`.

          ### Installation (SPM)

          In Xcode: **File > Add Package Dependencies** and enter:
          ```
          https://github.com/${{ github.repository }}
          ```
          Select version **${{ env.VERSION }}**.

          Or in `Package.swift`:
          ```swift
          .package(url: "https://github.com/${{ github.repository }}", exact: "${{ env.VERSION }}")
          ```
          Then depend on `"SCXSocketIO"` and/or `"SCXStarscream"`.

          ### Usage
          ```swift
          import SCXSocketIO

          let manager = SCXSocketManager(socketURL: URL(string: "https://example.com")!)
          let socket = manager.defaultSocket

          socket.on(clientEvent: .connect) { data, ack in
              print("Connected!")
          }
          socket.connect()
          ```

          ### Checksums
          | Artifact | SHA-256 |
          |----------|---------|
          | SCXStarscream.xcframework.zip | `${{ env.STARSCREAM_CHECKSUM }}` |
          | SCXSocketIO.xcframework.zip   | `${{ env.SOCKETIO_CHECKSUM }}`   |

          ### What's included
          - All public types prefixed with `SCX`
          - PrivacyInfo.xcprivacy embedded in both frameworks
          - iOS device + Simulator (arm64, x86_64)
          - Built with `BUILD_LIBRARY_FOR_DISTRIBUTION=YES`
        files: |
          build/output/SCXStarscream.xcframework.zip
          build/output/SCXSocketIO.xcframework.zip
          build/output/checksums.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
